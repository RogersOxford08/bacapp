<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSTR Profile Viewer</title>
<style>
  :root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #888;
    --accent: #7c3aed;
    --error: #e05252;
    --success: #4caf50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  header input {
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  header button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  header button:hover { opacity: 0.85; }
  .status {
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .status.connected { background: rgba(76,175,80,0.15); color: var(--success); }
  .status.disconnected { background: rgba(224,82,82,0.15); color: var(--error); }
  .status.connecting { background: rgba(255,193,7,0.15); color: #ffc107; }

  .npub-bar {
    max-width: 700px;
    margin: 0 auto;
    padding: 12px 16px 0;
    display: flex;
    gap: 8px;
  }
  .npub-bar input {
    flex: 1;
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .npub-bar button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .npub-bar button:hover { opacity: 0.85; }

  #npub-error {
    max-width: 700px;
    margin: 0 auto;
    padding: 4px 16px 0;
    color: var(--error);
    font-size: 12px;
    min-height: 16px;
  }

  .layout {
    max-width: 700px;
    margin: 0 auto;
    padding: 12px 16px 40px;
  }

  .empty-state {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ---- Profile card ---- */
  .profile-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .profile-banner {
    width: 100%;
    height: 140px;
    object-fit: cover;
    background: #222;
    display: block;
  }
  .profile-banner.placeholder {
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
  }
  .profile-body {
    padding: 16px;
    position: relative;
  }
  .profile-avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    border: 3px solid var(--panel);
    margin-top: -58px;
    margin-bottom: 10px;
    display: block;
  }
  .profile-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .profile-nip05 {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .profile-npub {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 10px;
  }
  .profile-about {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 4px;
  }

  /* ---- Notes list ---- */
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 10px;
    padding-left: 2px;
  }
  .note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .note-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .note-header .time {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }
  .note-content {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .note-content img {
    max-width: 100%;
    border-radius: 6px;
    margin-top: 8px;
  }
  .note-content a {
    color: var(--accent);
  }
  #loading-indicator {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
  }
</style>
</head>
<body>

<header>
  <input id="relay-input" type="text" placeholder="wss://relay.example.com" />
  <button id="relay-connect-btn">Connect</button>
  <span id="relay-status" class="status disconnected">disconnected</span>
</header>

<div class="npub-bar">
  <input id="npub-input" type="text" placeholder="npub1..." />
  <button id="npub-load-btn">Load Profile</button>
</div>
<div id="npub-error"></div>

<div class="layout">
  <div id="loading-indicator" style="display:none;">Loading profile...</div>

  <div id="profile-container"></div>

  <div id="notes-container" style="display:none;">
    <h3 class="section-title">Recent Notes</h3>
    <div id="notes-list"></div>
  </div>

  <div id="empty-state" class="empty-state">
    Add a relay and an npub to view a profile.
  </div>
</div>

<script type="module">
import { nip19, utils } from "https://esm.sh/nostr-tools@2.7.0";

// ---------- Config ----------
// How far back to fetch notes for this profile, in seconds.
const NOTES_WINDOW_SECONDS = 30 * 24 * 60 * 60; // 30 days

// ---------- State ----------
const state = {
  relayUrl: localStorage.getItem("nostr_relay") || "",
  pubkey: localStorage.getItem("nostr_profile_pubkey") || "", // single hex pubkey
  profile: null, // { name, picture, banner, about, nip05, _created_at }
  notes: new Map(), // id -> event
  ws: null,
  subIdProfile: "profile-" + Math.random().toString(36).slice(2),
  subIdNotes: "profile-notes-" + Math.random().toString(36).slice(2),
  connected: false,
};

// ---------- DOM refs ----------
const relayInput = document.getElementById("relay-input");
const relayConnectBtn = document.getElementById("relay-connect-btn");
const relayStatus = document.getElementById("relay-status");
const npubInput = document.getElementById("npub-input");
const npubLoadBtn = document.getElementById("npub-load-btn");
const npubError = document.getElementById("npub-error");
const loadingIndicator = document.getElementById("loading-indicator");
const profileContainer = document.getElementById("profile-container");
const notesContainer = document.getElementById("notes-container");
const notesList = document.getElementById("notes-list");
const emptyState = document.getElementById("empty-state");

// ---------- Utility ----------
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, (url) => {
    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
    if (isImage) {
      return `<br><img src="${url}" loading="lazy" />`;
    }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
  });
}

function shortenNpub(npub) {
  return npub.slice(0, 10) + "…" + npub.slice(-6);
}

function saveConfig() {
  localStorage.setItem("nostr_relay", state.relayUrl);
  localStorage.setItem("nostr_profile_pubkey", state.pubkey);
}

function isWithinNotesWindow(event) {
  const now = Math.floor(Date.now() / 1000);
  return (now - event.created_at) <= NOTES_WINDOW_SECONDS;
}

// ---------- Relay connection ----------
function setStatus(text, cls) {
  relayStatus.textContent = text;
  relayStatus.className = "status " + cls;
}

function connectRelay() {
  if (!state.relayUrl) return;

  if (state.ws) {
    try { state.ws.close(); } catch (e) {}
  }

  setStatus("connecting", "connecting");
  let ws;
  try {
    ws = new WebSocket(state.relayUrl);
  } catch (e) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.ws = ws;

  ws.onopen = () => {
    state.connected = true;
    setStatus("connected", "connected");
    if (state.pubkey) subscribeProfile();
  };

  ws.onclose = () => {
    state.connected = false;
    setStatus("disconnected", "disconnected");
    setTimeout(() => {
      if (state.relayUrl && state.ws === ws) connectRelay();
    }, 4000);
  };

  ws.onerror = () => {
    setStatus("error", "disconnected");
  };

  ws.onmessage = (msg) => {
    let data;
    try {
      data = JSON.parse(msg.data);
    } catch (e) {
      return;
    }
    handleRelayMessage(data);
  };
}

function handleRelayMessage(data) {
  const [type, subId, event] = data;

  if (type === "EVENT") {
    if (subId === state.subIdProfile) {
      handleProfileEvent(event);
    } else if (subId === state.subIdNotes) {
      handleNoteEvent(event);
    }
  } else if (type === "EOSE") {
    loadingIndicator.style.display = "none";
  } else if (type === "NOTICE") {
    console.warn("Relay notice:", subId);
  }
}

function sendReq(subId, filter) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["REQ", subId, filter]));
}

function closeSub(subId) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["CLOSE", subId]));
}

function subscribeProfile() {
  if (!state.pubkey) {
    renderEmptyState();
    return;
  }

  // reset previous profile/notes when loading a new one
  state.profile = null;
  state.notes.clear();
  renderProfile();
  renderNotes();

  loadingIndicator.style.display = "block";
  closeSub(state.subIdProfile);
  closeSub(state.subIdNotes);

  const since = Math.floor(Date.now() / 1000) - NOTES_WINDOW_SECONDS;

  sendReq(state.subIdProfile, {
    kinds: [0],
    authors: [state.pubkey],
    limit: 1,
  });

  sendReq(state.subIdNotes, {
    kinds: [1],
    authors: [state.pubkey],
    since: since,
    limit: 50,
  });
}

// ---------- Event handling ----------
function handleProfileEvent(event) {
  try {
    const meta = JSON.parse(event.content);
    if (!state.profile || state.profile._created_at < event.created_at) {
      state.profile = {
        name: meta.name || meta.display_name || "",
        picture: meta.picture || "",
        banner: meta.banner || "",
        about: meta.about || "",
        nip05: meta.nip05 || "",
        _created_at: event.created_at,
      };
      renderProfile();
    }
  } catch (e) {
    // ignore malformed metadata
  }
}

function handleNoteEvent(event) {
  if (state.notes.has(event.id)) return;
  if (!isWithinNotesWindow(event)) return;
  state.notes.set(event.id, event);
  renderNotes();
}

// ---------- Rendering ----------
function renderEmptyState() {
  const hasRelay = !!state.relayUrl;
  const hasPubkey = !!state.pubkey;
  const show = !(hasRelay && hasPubkey);
  emptyState.style.display = show ? "block" : "none";
  profileContainer.style.display = show ? "none" : "block";
  notesContainer.style.display = show ? "none" : "block";

  if (!hasRelay) {
    emptyState.textContent = "Add and connect a relay to get started.";
  } else if (!hasPubkey) {
    emptyState.textContent = "Enter an npub to load a profile.";
  }
}

function renderProfile() {
  renderEmptyState();
  if (!state.pubkey) {
    profileContainer.innerHTML = "";
    return;
  }

  const npub = nip19.npubEncode(state.pubkey);
  const profile = state.profile || {};
  const name = profile.name || shortenNpub(npub);
  const avatar = profile.picture || "";
  const banner = profile.banner || "";
  const about = profile.about ? linkify(escapeHtml(profile.about)) : "";
  const nip05 = profile.nip05 ? escapeHtml(profile.nip05) : "";

  profileContainer.innerHTML = `
    <div class="profile-card">
      ${banner
        ? `<img class="profile-banner" src="${banner}" loading="lazy" />`
        : `<div class="profile-banner placeholder"></div>`}
      <div class="profile-body">
        ${avatar
          ? `<img class="profile-avatar" src="${avatar}" loading="lazy" />`
          : `<div class="profile-avatar" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">no pic</div>`}
        <div class="profile-name">${escapeHtml(name)}</div>
        ${nip05 ? `<div class="profile-nip05">✓ ${nip05}</div>` : ""}
        <div class="profile-npub" title="${npub}">${npub}</div>
        ${about ? `<div class="profile-about">${about}</div>` : ""}
      </div>
    </div>
  `;
}

function renderNotes() {
  if (!state.pubkey) {
    notesList.innerHTML = "";
    return;
  }

  const sorted = Array.from(state.notes.values())
    .filter(isWithinNotesWindow)
    .sort((a, b) => b.created_at - a.created_at)
    .slice(0, 200);

  if (sorted.length === 0) {
    notesList.innerHTML = `<div class="empty-state" style="padding:20px;">No recent notes found for this profile.</div>`;
    return;
  }

  notesList.innerHTML = sorted.map(renderNote).join("");
}

function renderNote(event) {
  const date = new Date(event.created_at * 1000).toLocaleString();
  const content = linkify(escapeHtml(event.content));

  return `
    <div class="note">
      <div class="note-header">
        <span class="time">${date}</span>
      </div>
      <div class="note-content">${content}</div>
    </div>
  `;
}

// ---------- Npub loading ----------
function loadNpub(npubStr) {
  npubError.textContent = "";
  npubStr = npubStr.trim();

  let hex;
  try {
    const decoded = nip19.decode(npubStr);
    if (decoded.type !== "npub") throw new Error("Not an npub");
    hex = decoded.data;
  } catch (e) {
    npubError.textContent = "Invalid npub format.";
    return;
  }

  state.pubkey = hex;
  saveConfig();
  renderEmptyState();

  if (state.connected) {
    subscribeProfile();
  } else {
    // show placeholder profile immediately using the npub itself
    state.profile = null;
    state.notes.clear();
    renderProfile();
    renderNotes();
  }
}

// ---------- Relay management ----------
function setRelay(url) {
  url = url.trim();
  if (!/^wss?:\/\//.test(url)) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.relayUrl = url;
  saveConfig();
  connectRelay();
}

// ---------- Event listeners ----------
relayConnectBtn.addEventListener("click", () => setRelay(relayInput.value));
relayInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") setRelay(relayInput.value);
});

npubLoadBtn.addEventListener("click", () => loadNpub(npubInput.value));
npubInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadNpub(npubInput.value);
});

// ---------- Init ----------
function init() {
  relayInput.value = state.relayUrl;
  if (state.pubkey) {
    try {
      npubInput.value = nip19.npubEncode(state.pubkey);
    } catch (e) {
      // ignore
    }
  }
  renderEmptyState();
  renderProfile();
  renderNotes();
  if (state.relayUrl) connectRelay();
}

init();
</script>

</body>
</html>
