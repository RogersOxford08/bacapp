<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSTR Profile Feed</title>
<style>
  :root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #888;
    --accent: #7c3aed;
    --error: #e05252;
    --success: #4caf50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  header input {
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  header button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  header button:hover { opacity: 0.85; }
  .status {
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .status.connected { background: rgba(76,175,80,0.15); color: var(--success); }
  .status.disconnected { background: rgba(224,82,82,0.15); color: var(--error); }
  .status.connecting { background: rgba(255,193,7,0.15); color: #ffc107; }

  .app-layout {
    display: flex;
    max-width: 900px;
    margin: 0 auto;
  }
  aside {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 12px;
    min-height: 80vh;
  }
  aside h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .npub-form {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .npub-form input {
    flex: 1;
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .npub-form button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .npub-form button:hover { opacity: 0.85; }
  #npub-error {
    color: var(--error);
    font-size: 12px;
    margin-bottom: 8px;
    min-height: 14px;
  }
  .npub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .npub-item img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #333;
    object-fit: cover;
  }
  .npub-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .npub-item button {
    background: none;
    border: none;
    color: var(--error);
    cursor: pointer;
    font-size: 12px;
  }

  main {
    flex: 1;
    max-width: 620px;
    margin: 0 auto;
    padding: 12px 16px 40px;
  }

  .empty-state {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ---- Profile card ---- */
  .profile-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .profile-card:hover {
    border-color: var(--accent);
  }
  .profile-banner {
    width: 100%;
    height: 120px;
    object-fit: cover;
    background: #222;
    display: block;
  }
  .profile-banner.placeholder {
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
  }
  .profile-body {
    padding: 16px;
    position: relative;
  }
  .profile-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    border: 3px solid var(--panel);
    margin-top: -48px;
    margin-bottom: 10px;
    display: block;
  }
  .profile-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .profile-nip05 {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .profile-npub {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 10px;
  }
  .profile-about {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #loading-indicator {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
  }
</style>
</head>
<body>

<header>
  <input id="relay-input" type="text" placeholder="wss://relay.example.com" />
  <button id="relay-connect-btn">Connect</button>
  <span id="relay-status" class="status disconnected">disconnected</span>
</header>

<div class="app-layout">
  <aside>
    <h3>Followed npubs</h3>
    <div class="npub-form">
      <input id="npub-input" type="text" placeholder="npub1..." />
      <button id="npub-add-btn">Add</button>
    </div>
    <div id="npub-error"></div>
    <div id="npub-list"></div>
  </aside>

  <main>
    <div id="loading-indicator" style="display:none;">Loading profiles...</div>
    <div id="profiles-feed"></div>
    <div id="empty-state" class="empty-state">
      Add a relay and at least one npub to see profiles.
    </div>
  </main>
</div>

<script type="module">
import { nip19, utils } from "https://esm.sh/nostr-tools@2.7.0";

// ---------- State ----------
const state = {
  relayUrl: localStorage.getItem("nostr_relay") || "",
  pubkeys: JSON.parse(localStorage.getItem("nostr_pubkeys") || "[]"), // hex pubkeys
  profiles: {}, // hex -> { name, picture, banner, about, nip05, _created_at }
  ws: null,
  subIdProfiles: "profiles-" + Math.random().toString(36).slice(2),
  connected: false,
};

// ---------- DOM refs ----------
const relayInput = document.getElementById("relay-input");
const relayConnectBtn = document.getElementById("relay-connect-btn");
const relayStatus = document.getElementById("relay-status");
const npubInput = document.getElementById("npub-input");
const npubAddBtn = document.getElementById("npub-add-btn");
const npubError = document.getElementById("npub-error");
const npubList = document.getElementById("npub-list");
const loadingIndicator = document.getElementById("loading-indicator");
const profilesFeed = document.getElementById("profiles-feed");
const emptyState = document.getElementById("empty-state");

// ---------- Utility ----------
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, (url) => {
    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
    if (isImage) {
      return `<br><img src="${url}" loading="lazy" />`;
    }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
  });
}

function shortenNpub(npub) {
  return npub.slice(0, 10) + "…" + npub.slice(-6);
}

function saveConfig() {
  localStorage.setItem("nostr_relay", state.relayUrl);
  localStorage.setItem("nostr_pubkeys", JSON.stringify(state.pubkeys));
}

// ---------- Relay connection ----------
function setStatus(text, cls) {
  relayStatus.textContent = text;
  relayStatus.className = "status " + cls;
}

function connectRelay() {
  if (!state.relayUrl) return;

  if (state.ws) {
    try { state.ws.close(); } catch (e) {}
  }

  setStatus("connecting", "connecting");
  let ws;
  try {
    ws = new WebSocket(state.relayUrl);
  } catch (e) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.ws = ws;

  ws.onopen = () => {
    state.connected = true;
    setStatus("connected", "connected");
    subscribeProfiles();
  };

  ws.onclose = () => {
    state.connected = false;
    setStatus("disconnected", "disconnected");
    setTimeout(() => {
      if (state.relayUrl && state.ws === ws) connectRelay();
    }, 4000);
  };

  ws.onerror = () => {
    setStatus("error", "disconnected");
  };

  ws.onmessage = (msg) => {
    let data;
    try {
      data = JSON.parse(msg.data);
    } catch (e) {
      return;
    }
    handleRelayMessage(data);
  };
}

function handleRelayMessage(data) {
  const [type, subId, event] = data;

  if (type === "EVENT") {
    if (subId === state.subIdProfiles) {
      handleProfileEvent(event);
    }
  } else if (type === "EOSE") {
    loadingIndicator.style.display = "none";
  } else if (type === "NOTICE") {
    console.warn("Relay notice:", subId);
  }
}

function sendReq(subId, filter) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["REQ", subId, filter]));
}

function closeSub(subId) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["CLOSE", subId]));
}

function subscribeProfiles() {
  if (state.pubkeys.length === 0) {
    renderEmptyState();
    return;
  }
  loadingIndicator.style.display = "block";
  closeSub(state.subIdProfiles);

  sendReq(state.subIdProfiles, {
    kinds: [0],
    authors: state.pubkeys,
  });
}

// ---------- Event handling ----------
function handleProfileEvent(event) {
  try {
    const meta = JSON.parse(event.content);
    const existing = state.profiles[event.pubkey];
    if (!existing || existing._created_at < event.created_at) {
      state.profiles[event.pubkey] = {
        name: meta.name || meta.display_name || "",
        picture: meta.picture || "",
        banner: meta.banner || "",
        about: meta.about || "",
        nip05: meta.nip05 || "",
        _created_at: event.created_at,
      };
      renderNpubList();
      renderProfilesFeed();
    }
  } catch (e) {
    // ignore malformed metadata
  }
}

// ---------- Rendering ----------
function renderEmptyState() {
  const hasRelay = !!state.relayUrl;
  const hasNpubs = state.pubkeys.length > 0;
  const show = !(hasRelay && hasNpubs);
  emptyState.style.display = show ? "block" : "none";
  profilesFeed.style.display = show ? "none" : "block";

  if (!hasRelay) {
    emptyState.textContent = "Add and connect a relay to get started.";
  } else if (!hasNpubs) {
    emptyState.textContent = "Add at least one npub to see profiles.";
  }
}

function renderProfilesFeed() {
  renderEmptyState();
  if (state.pubkeys.length === 0) {
    profilesFeed.innerHTML = "";
    return;
  }

  profilesFeed.innerHTML = state.pubkeys.map(renderProfileCard).join("");
}

function renderProfileCard(hex) {
  const npub = nip19.npubEncode(hex);
  const profile = state.profiles[hex] || {};
  const name = profile.name || shortenNpub(npub);
  const avatar = profile.picture || "";
  const banner = profile.banner || "";
  const about = profile.about ? linkify(escapeHtml(profile.about)) : "";
  const nip05 = profile.nip05 ? escapeHtml(profile.nip05) : "";

  return `
    <div class="profile-card" data-hex="${hex}" title="Click to view notes (coming soon)">
      ${banner
        ? `<img class="profile-banner" src="${banner}" loading="lazy" />`
        : `<div class="profile-banner placeholder"></div>`}
      <div class="profile-body">
        ${avatar
          ? `<img class="profile-avatar" src="${avatar}" loading="lazy" />`
          : `<div class="profile-avatar" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">no pic</div>`}
        <div class="profile-name">${escapeHtml(name)}</div>
        ${nip05 ? `<div class="profile-nip05">✓ ${nip05}</div>` : ""}
        <div class="profile-npub" title="${npub}">${npub}</div>
        ${about ? `<div class="profile-about">${about}</div>` : ""}
      </div>
    </div>
  `;
}

function renderNpubList() {
  npubList.innerHTML = state.pubkeys.map((hex) => {
    const npub = nip19.npubEncode(hex);
    const profile = state.profiles[hex] || {};
    const name = profile.name || shortenNpub(npub);
    const avatar = profile.picture || "";
    return `
      <div class="npub-item" data-hex="${hex}">
        ${avatar ? `<img src="${avatar}" loading="lazy" />` : `<img src="" style="visibility:hidden" />`}
        <span class="name" title="${npub}">${escapeHtml(name)}</span>
        <button data-remove="${hex}">✕</button>
      </div>
    `;
  }).join("");

  npubList.querySelectorAll("button[data-remove]").forEach((btn) => {
    btn.addEventListener("click", () => removeNpub(btn.dataset.remove));
  });
}

// ---------- Npub management ----------
function addNpub(npubStr) {
  npubError.textContent = "";
  npubStr = npubStr.trim();

  let hex;
  try {
    const decoded = nip19.decode(npubStr);
    if (decoded.type !== "npub") throw new Error("Not an npub");
    hex = decoded.data;
  } catch (e) {
    npubError.textContent = "Invalid npub format.";
    return;
  }

  if (state.pubkeys.includes(hex)) {
    npubError.textContent = "Already added.";
    return;
  }

  state.pubkeys.push(hex);
  saveConfig();
  renderNpubList();
  renderProfilesFeed();
  npubInput.value = "";

  if (state.connected) subscribeProfiles();
}

function removeNpub(hex) {
  state.pubkeys = state.pubkeys.filter((k) => k !== hex);
  delete state.profiles[hex];
  saveConfig();
  renderNpubList();
  renderProfilesFeed();

  if (state.connected) subscribeProfiles();
}

// ---------- Relay management ----------
function setRelay(url) {
  url = url.trim();
  if (!/^wss?:\/\//.test(url)) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.relayUrl = url;
  saveConfig();
  connectRelay();
}

// ---------- Event listeners ----------
relayConnectBtn.addEventListener("click", () => setRelay(relayInput.value));
relayInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") setRelay(relayInput.value);
});

npubAddBtn.addEventListener("click", () => addNpub(npubInput.value));
npubInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") addNpub(npubInput.value);
});

// Placeholder click handler for profile cards -- wire up notes view here later
profilesFeed.addEventListener("click", (e) => {
  const card = e.target.closest(".profile-card");
  if (!card) return;
  const hex = card.dataset.hex;
  console.log("Profile clicked:", hex, "-- notes view not yet implemented");
});

// ---------- Init ----------
function init() {
  relayInput.value = state.relayUrl;
  renderNpubList();
  renderEmptyState();
  renderProfilesFeed();
  if (state.relayUrl) connectRelay();
}

init();
</script>

</body>
</html>
