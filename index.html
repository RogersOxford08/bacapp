<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSTR Profile Feeds</title>
<style>
  :root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #888;
    --accent: #7c3aed;
    --error: #e05252;
    --success: #4caf50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  header input {
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  header button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  header button:hover { opacity: 0.85; }
  .status {
    font-size: 13px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .status.connected { background: rgba(76,175,80,0.15); color: var(--success); }
  .status.disconnected { background: rgba(224,82,82,0.15); color: var(--error); }
  .status.connecting { background: rgba(255,193,7,0.15); color: #ffc107; }

  /* ---- Nav bar ---- */
  .nav-bar {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 16px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .nav-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .nav-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .app-layout {
    display: flex;
    max-width: 900px;
    margin: 0 auto;
  }
  aside {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 12px;
    min-height: 80vh;
  }
  aside h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .npub-form {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .npub-form input {
    flex: 1;
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  .npub-form button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .npub-form button:hover { opacity: 0.85; }
  #npub-error {
    color: var(--error);
    font-size: 12px;
    margin-bottom: 8px;
    min-height: 14px;
  }
  .npub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .npub-item img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #333;
    object-fit: cover;
  }
  .npub-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .npub-item button {
    background: none;
    border: none;
    color: var(--error);
    cursor: pointer;
    font-size: 12px;
  }

  main {
    flex: 1;
    max-width: 620px;
    margin: 0 auto;
    padding: 12px 16px 40px;
  }

  .empty-state {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ---- Profile card ---- */
  .profile-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  .profile-card:hover {
    border-color: var(--accent);
  }
  .profile-banner {
    width: 100%;
    height: 120px;
    object-fit: cover;
    background: #222;
    display: block;
  }
  .profile-banner.placeholder {
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
  }
  .profile-body {
    padding: 16px;
    position: relative;
  }
  .profile-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    border: 3px solid var(--panel);
    margin-top: -48px;
    margin-bottom: 10px;
    display: block;
  }
  .profile-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .profile-nip05 {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .profile-npub {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 10px;
  }
  .profile-about {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #loading-indicator {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
  }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1000;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 560px;
    max-height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .modal-close-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .modal-close-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }
  .modal-header {
    padding: 16px 44px 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
  }
  .modal-header .modal-title {
    font-size: 16px;
    font-weight: 700;
  }
  .modal-body {
    padding: 16px;
    overflow-y: auto;
  }
  .modal-loading {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
  }
  .modal-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 10px;
  }

  .note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .note-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .note-header .time {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }
  .note-content {
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .note-content img {
    max-width: 100%;
    border-radius: 6px;
    margin-top: 8px;
  }
  .note-content a {
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <input id="relay-input" type="text" placeholder="wss://relay.example.com" />
  <button id="relay-connect-btn">Connect</button>
  <span id="relay-status" class="status disconnected">disconnected</span>
</header>

<div class="nav-bar" id="nav-bar"></div>

<div class="app-layout">
  <aside id="sidebar-container"></aside>
  <main id="main-container"></main>
</div>

<!-- ---------- Notes Modal ---------- -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <button id="modal-close-btn" class="modal-close-btn" aria-label="Close">✕</button>
    <div class="modal-header">
      <img id="modal-avatar" src="" style="visibility:hidden;" />
      <span id="modal-title" class="modal-title">Notes</span>
    </div>
    <div class="modal-body">
      <div id="modal-loading" class="modal-loading" style="display:none;">Loading notes...</div>
      <div id="modal-notes-list"></div>
      <div id="modal-empty" class="modal-empty" style="display:none;">No recent notes found.</div>
    </div>
  </div>
</div>

<script type="module">
import { nip19, utils } from "https://esm.sh/nostr-tools@2.7.0";

// ---------- Feed page config ----------
// Add more entries here later to create additional feed pages.
// Each feed maintains its own independent npub list and profile cards.
const FEEDS = [
  { id: "feed1", label: "Feed 1" },
  { id: "feed2", label: "Feed 2" },
];

const MODAL_NOTES_WINDOW_SECONDS = 30 * 24 * 60 * 60; // 30 days

// ---------- State ----------
const state = {
  relayUrl: localStorage.getItem("nostr_relay") || "",
  ws: null,
  connected: false,

  activeFeedId: localStorage.getItem("nostr_active_feed_id") || FEEDS[0].id,

  // feedId -> { pubkeys: [hex...], profiles: { hex -> {...} }, subId: string }
  feedData: {},

  modal: {
    open: false,
    feedId: null,
    pubkey: null,
    subId: null,
    notes: new Map(),
  },
};

if (!FEEDS.some((f) => f.id === state.activeFeedId)) {
  state.activeFeedId = FEEDS[0].id;
}

function initFeedData(feedId) {
  return {
    pubkeys: JSON.parse(localStorage.getItem(`nostr_pubkeys_${feedId}`) || "[]"),
    profiles: {},
    subId: `profiles-${feedId}-` + Math.random().toString(36).slice(2),
  };
}

FEEDS.forEach((f) => {
  state.feedData[f.id] = initFeedData(f.id);
});

// ---------- DOM refs (static shell) ----------
const relayInput = document.getElementById("relay-input");
const relayConnectBtn = document.getElementById("relay-connect-btn");
const relayStatus = document.getElementById("relay-status");
const navBar = document.getElementById("nav-bar");
const sidebarContainer = document.getElementById("sidebar-container");
const mainContainer = document.getElementById("main-container");

const modalOverlay = document.getElementById("modal-overlay");
const modalCloseBtn = document.getElementById("modal-close-btn");
const modalAvatar = document.getElementById("modal-avatar");
const modalTitle = document.getElementById("modal-title");
const modalLoading = document.getElementById("modal-loading");
const modalNotesList = document.getElementById("modal-notes-list");
const modalEmpty = document.getElementById("modal-empty");

// ---------- Utility ----------
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, (url) => {
    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
    if (isImage) {
      return `<br><img src="${url}" loading="lazy" />`;
    }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
  });
}

function shortenNpub(npub) {
  return npub.slice(0, 10) + "…" + npub.slice(-6);
}

function saveRelayConfig() {
  localStorage.setItem("nostr_relay", state.relayUrl);
}

function saveFeedPubkeys(feedId) {
  localStorage.setItem(
    `nostr_pubkeys_${feedId}`,
    JSON.stringify(state.feedData[feedId].pubkeys)
  );
}

function saveActiveFeedId() {
  localStorage.setItem("nostr_active_feed_id", state.activeFeedId);
}

function isWithinModalWindow(event) {
  const now = Math.floor(Date.now() / 1000);
  return (now - event.created_at) <= MODAL_NOTES_WINDOW_SECONDS;
}

function findFeedIdBySubId(subId) {
  for (const feedId in state.feedData) {
    if (state.feedData[feedId].subId === subId) return feedId;
  }
  return null;
}

// ---------- Relay connection ----------
function setStatus(text, cls) {
  relayStatus.textContent = text;
  relayStatus.className = "status " + cls;
}

function connectRelay() {
  if (!state.relayUrl) return;

  if (state.ws) {
    try { state.ws.close(); } catch (e) {}
  }

  setStatus("connecting", "connecting");
  let ws;
  try {
    ws = new WebSocket(state.relayUrl);
  } catch (e) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.ws = ws;

  ws.onopen = () => {
    state.connected = true;
    setStatus("connected", "connected");
    subscribeFeedProfiles(state.activeFeedId);
    if (state.modal.open && state.modal.pubkey) {
      subscribeModalNotes(state.modal.pubkey);
    }
  };

  ws.onclose = () => {
    state.connected = false;
    setStatus("disconnected", "disconnected");
    setTimeout(() => {
      if (state.relayUrl && state.ws === ws) connectRelay();
    }, 4000);
  };

  ws.onerror = () => {
    setStatus("error", "disconnected");
  };

  ws.onmessage = (msg) => {
    let data;
    try {
      data = JSON.parse(msg.data);
    } catch (e) {
      return;
    }
    handleRelayMessage(data);
  };
}

function handleRelayMessage(data) {
  const [type, subId, event] = data;

  if (type === "EVENT") {
    const feedId = findFeedIdBySubId(subId);
    if (feedId) {
      handleProfileEvent(feedId, event);
    } else if (subId === state.modal.subId) {
      handleModalNoteEvent(event);
    }
  } else if (type === "EOSE") {
    const feedId = findFeedIdBySubId(subId);
    if (feedId === state.activeFeedId) {
      const loadingIndicator = document.getElementById("loading-indicator");
      if (loadingIndicator) loadingIndicator.style.display = "none";
    } else if (subId === state.modal.subId) {
      modalLoading.style.display = "none";
      renderModalNotes();
    }
  } else if (type === "NOTICE") {
    console.warn("Relay notice:", subId);
  }
}

function sendReq(subId, filter) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["REQ", subId, filter]));
}

function closeSub(subId) {
  if (!subId) return;
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
  state.ws.send(JSON.stringify(["CLOSE", subId]));
}

function subscribeFeedProfiles(feedId) {
  const feed = state.feedData[feedId];
  if (!feed || feed.pubkeys.length === 0) {
    renderActiveFeed();
    return;
  }

  const loadingIndicator = document.getElementById("loading-indicator");
  if (loadingIndicator) loadingIndicator.style.display = "block";

  closeSub(feed.subId);
  sendReq(feed.subId, {
    kinds: [0],
    authors: feed.pubkeys,
  });
}

// ---------- Profile event handling ----------
function handleProfileEvent(feedId, event) {
  try {
    const meta = JSON.parse(event.content);
    const feed = state.feedData[feedId];
    const existing = feed.profiles[event.pubkey];
    if (!existing || existing._created_at < event.created_at) {
      feed.profiles[event.pubkey] = {
        name: meta.name || meta.display_name || "",
        picture: meta.picture || "",
        banner: meta.banner || "",
        about: meta.about || "",
        nip05: meta.nip05 || "",
        _created_at: event.created_at,
      };

      if (feedId === state.activeFeedId) {
        renderSidebar();
        renderMainProfiles();
      }
      if (state.modal.open && state.modal.feedId === feedId && state.modal.pubkey === event.pubkey) {
        renderModalHeader();
      }
    }
  } catch (e) {
    // ignore malformed metadata
  }
}

// ---------- Nav bar rendering ----------
function renderNav() {
  navBar.innerHTML = FEEDS.map((f) => `
    <button class="nav-btn ${f.id === state.activeFeedId ? "active" : ""}" data-feed-id="${f.id}">
      ${escapeHtml(f.label)}
    </button>
  `).join("");
}

navBar.addEventListener("click", (e) => {
  const btn = e.target.closest(".nav-btn");
  if (!btn) return;
  switchFeed(btn.dataset.feedId);
});

function switchFeed(feedId) {
  if (!state.feedData[feedId] || feedId === state.activeFeedId) return;
  state.activeFeedId = feedId;
  saveActiveFeedId();
  renderNav();
  renderActiveFeed();
  if (state.connected) subscribeFeedProfiles(feedId);
}

// ---------- Active feed rendering (sidebar + main) ----------
function renderActiveFeed() {
  renderSidebar();
  renderMainProfiles();
}

function renderSidebar() {
  const feedId = state.activeFeedId;
  const feed = state.feedData[feedId];

  sidebarContainer.innerHTML = `
    <h3>Followed npubs</h3>
    <div class="npub-form">
      <input id="npub-input" type="text" placeholder="npub1..." />
      <button id="npub-add-btn">Add</button>
    </div>
    <div id="npub-error"></div>
    <div id="npub-list">
      ${feed.pubkeys.map((hex) => renderNpubItem(feedId, hex)).join("")}
    </div>
  `;
}

function renderNpubItem(feedId, hex) {
  const feed = state.feedData[feedId];
  const npub = nip19.npubEncode(hex);
  const profile = feed.profiles[hex] || {};
  const name = profile.name || shortenNpub(npub);
  const avatar = profile.picture || "";
  return `
    <div class="npub-item" data-hex="${hex}">
      ${avatar ? `<img src="${avatar}" loading="lazy" />` : `<img src="" style="visibility:hidden" />`}
      <span class="name" title="${npub}">${escapeHtml(name)}</span>
      <button data-remove="${hex}">✕</button>
    </div>
  `;
}

function renderMainProfiles() {
  const feedId = state.activeFeedId;
  const feed = state.feedData[feedId];
  const hasRelay = !!state.relayUrl;
  const hasNpubs = feed.pubkeys.length > 0;
  const showEmpty = !(hasRelay && hasNpubs);

  let emptyText = "";
  if (!hasRelay) {
    emptyText = "Add and connect a relay to get started.";
  } else if (!hasNpubs) {
    emptyText = "Add at least one npub to see profiles.";
  }

  mainContainer.innerHTML = `
    <div id="loading-indicator" style="display:none;">Loading profiles...</div>
    <div id="profiles-feed" style="display:${showEmpty ? "none" : "block"};">
      ${feed.pubkeys.map((hex) => renderProfileCard(feedId, hex)).join("")}
    </div>
    <div id="empty-state" class="empty-state" style="display:${showEmpty ? "block" : "none"};">
      ${escapeHtml(emptyText)}
    </div>
  `;
}

function renderProfileCard(feedId, hex) {
  const feed = state.feedData[feedId];
  const npub = nip19.npubEncode(hex);
  const profile = feed.profiles[hex] || {};
  const name = profile.name || shortenNpub(npub);
  const avatar = profile.picture || "";
  const banner = profile.banner || "";
  const about = profile.about ? linkify(escapeHtml(profile.about)) : "";
  const nip05 = profile.nip05 ? escapeHtml(profile.nip05) : "";

  return `
    <div class="profile-card" data-hex="${hex}" title="Click to view notes">
      ${banner
        ? `<img class="profile-banner" src="${banner}" loading="lazy" />`
        : `<div class="profile-banner placeholder"></div>`}
      <div class="profile-body">
        ${avatar
          ? `<img class="profile-avatar" src="${avatar}" loading="lazy" />`
          : `<div class="profile-avatar" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">no pic</div>`}
        <div class="profile-name">${escapeHtml(name)}</div>
        ${nip05 ? `<div class="profile-nip05">✓ ${nip05}</div>` : ""}
        <div class="profile-npub" title="${npub}">${npub}</div>
        ${about ? `<div class="profile-about">${about}</div>` : ""}
      </div>
    </div>
  `;
}

// ---------- Npub management (operates on active feed) ----------
function addNpub(npubStr) {
  const npubError = document.getElementById("npub-error");
  npubError.textContent = "";
  npubStr = npubStr.trim();

  let hex;
  try {
    const decoded = nip19.decode(npubStr);
    if (decoded.type !== "npub") throw new Error("Not an npub");
    hex = decoded.data;
  } catch (e) {
    npubError.textContent = "Invalid npub format.";
    return;
  }

  const feedId = state.activeFeedId;
  const feed = state.feedData[feedId];

  if (feed.pubkeys.includes(hex)) {
    npubError.textContent = "Already added.";
    return;
  }

  feed.pubkeys.push(hex);
  saveFeedPubkeys(feedId);
  renderSidebar();
  renderMainProfiles();

  const npubInput = document.getElementById("npub-input");
  if (npubInput) npubInput.value = "";

  if (state.connected) subscribeFeedProfiles(feedId);
}

function removeNpub(hex) {
  const feedId = state.activeFeedId;
  const feed = state.feedData[feedId];

  feed.pubkeys = feed.pubkeys.filter((k) => k !== hex);
  delete feed.profiles[hex];
  saveFeedPubkeys(feedId);
  renderSidebar();
  renderMainProfiles();

  if (state.connected) subscribeFeedProfiles(feedId);

  if (state.modal.open && state.modal.feedId === feedId && state.modal.pubkey === hex) {
    closeModal();
  }
}

// ---------- Relay management ----------
function setRelay(url) {
  url = url.trim();
  if (!/^wss?:\/\//.test(url)) {
    setStatus("invalid url", "disconnected");
    return;
  }
  state.relayUrl = url;
  saveRelayConfig();
  connectRelay();
}

// ==========================================================
// ---------- Notes Modal (shared across all feed pages) ----------
// ==========================================================

function openModal(feedId, hex) {
  closeModalSubscription();

  state.modal.open = true;
  state.modal.feedId = feedId;
  state.modal.pubkey = hex;
  state.modal.notes.clear();
  state.modal.subId = "modal-notes-" + Math.random().toString(36).slice(2);

  modalOverlay.classList.add("open");
  document.body.style.overflow = "hidden";

  renderModalHeader();
  modalNotesList.innerHTML = "";
  modalEmpty.style.display = "none";
  modalLoading.style.display = "block";

  if (state.connected) {
    subscribeModalNotes(hex);
  } else {
    modalLoading.style.display = "none";
    modalEmpty.style.display = "block";
    modalEmpty.textContent = "Not connected to a relay.";
  }
}

function closeModal() {
  closeModalSubscription();
  state.modal.open = false;
  state.modal.feedId = null;
  state.modal.pubkey = null;
  state.modal.notes.clear();
  modalOverlay.classList.remove("open");
  document.body.style.overflow = "";
}

function closeModalSubscription() {
  if (state.modal.subId) {
    closeSub(state.modal.subId);
  }
  state.modal.subId = null;
}

function subscribeModalNotes(hex) {
  modalLoading.style.display = "block";
  modalEmpty.style.display = "none";

  const since = Math.floor(Date.now() / 1000) - MODAL_NOTES_WINDOW_SECONDS;

  sendReq(state.modal.subId, {
    kinds: [1],
    authors: [hex],
    since: since,
    limit: 50,
  });
}

function handleModalNoteEvent(event) {
  if (state.modal.notes.has(event.id)) return;
  if (!isWithinModalWindow(event)) return;
  state.modal.notes.set(event.id, event);
  renderModalNotes();
}

function renderModalHeader() {
  const feedId = state.modal.feedId;
  const hex = state.modal.pubkey;
  if (!hex || !feedId) return;

  const feed = state.feedData[feedId];
  const npub = nip19.npubEncode(hex);
  const profile = feed.profiles[hex] || {};
  const name = profile.name || shortenNpub(npub);
  const avatar = profile.picture || "";

  modalTitle.textContent = name;
  if (avatar) {
    modalAvatar.src = avatar;
    modalAvatar.style.visibility = "visible";
  } else {
    modalAvatar.removeAttribute("src");
    modalAvatar.style.visibility = "hidden";
  }
}

function renderModalNotes() {
  const sorted = Array.from(state.modal.notes.values())
    .filter(isWithinModalWindow)
    .sort((a, b) => b.created_at - a.created_at)
    .slice(0, 200);

  if (sorted.length === 0) {
    modalNotesList.innerHTML = "";
    modalEmpty.style.display = "block";
    modalEmpty.textContent = "No recent notes found.";
    return;
  }

  modalEmpty.style.display = "none";
  modalNotesList.innerHTML = sorted.map(renderModalNote).join("");
}

function renderModalNote(event) {
  const date = new Date(event.created_at * 1000).toLocaleString();
  const content = linkify(escapeHtml(event.content));

  return `
    <div class="note">
      <div class="note-header">
        <span class="time">${date}</span>
      </div>
      <div class="note-content">${content}</div>
    </div>
  `;
}

// ---------- Event listeners (delegated, survive innerHTML re-renders) ----------
relayConnectBtn.addEventListener("click", () => setRelay(relayInput.value));
relayInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") setRelay(relayInput.value);
});

sidebarContainer.addEventListener("click", (e) => {
  if (e.target && e.target.id === "npub-add-btn") {
    const npubInput = document.getElementById("npub-input");
    addNpub(npubInput.value);
    return;
  }
  const removeBtn = e.target.closest("button[data-remove]");
  if (removeBtn) {
    removeNpub(removeBtn.dataset.remove);
  }
});

sidebarContainer.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.target && e.target.id === "npub-input") {
    addNpub(e.target.value);
  }
});

mainContainer.addEventListener("click", (e) => {
  const card = e.target.closest(".profile-card");
  if (!card) return;
  const hex = card.dataset.hex;
  openModal(state.activeFeedId, hex);
});

modalCloseBtn.addEventListener("click", closeModal);

modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && state.modal.open) closeModal();
});

// ---------- Init ----------
function init() {
  relayInput.value = state.relayUrl;
  renderNav();
  renderActiveFeed();
  if (state.relayUrl) connectRelay();
}

init();
</script>

</body>
</html>
